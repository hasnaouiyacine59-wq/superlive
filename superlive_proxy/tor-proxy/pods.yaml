---
# Shared log volume
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: thor-logs
  namespace: tor-net
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 1Gi

---
# thor-session pods (x4)
# Each connects to its paired tor service by DNS name within the namespace

apiVersion: v1
kind: Pod
metadata:
  name: thor-session-1
  namespace: tor-net
  labels:
    app: thor-session
    instance: thor-session-1
spec:
  hostname: sec-session-1
  restartPolicy: OnFailure
  containers:
  - name: thor-session
    image: quay.io/mylastres0rt05_redhat/nova_dromidia:latest
    env:
    - name: SOCKS_PORT
      value: "9050"
    - name: API_PORT
      value: "5000"
    - name: TOR_HOST
      value: "tor-9050"
    ports:
    - containerPort: 8080
    volumeMounts:
    - name: logs
      mountPath: /logs
  volumes:
  - name: logs
    persistentVolumeClaim:
      claimName: thor-logs
---
apiVersion: v1
kind: Service
metadata:
  name: thor-session-1
  namespace: tor-net
spec:
  type: NodePort
  selector:
    instance: thor-session-1
  ports:
  - port: 8080
    nodePort: 30080

