---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: tor-net

---
# tor-proxy pods + ClusterIP services (x4)
# i=0: SOCKS=9050 CTRL=9051 API=5000
# i=1: SOCKS=9052 CTRL=9053 API=5001
# i=2: SOCKS=9054 CTRL=9055 API=5002
# i=3: SOCKS=9056 CTRL=9057 API=5003

apiVersion: v1
kind: Pod
metadata:
  name: tor-9050
  namespace: tor-net
  labels:
    app: tor-proxy
    instance: tor-9050
spec:
  restartPolicy: OnFailure
  containers:
  - name: tor-proxy
    image: quay.io/mylastres0rt05_redhat/nova_dromidia-proxy:latest
    env:
    - name: SOCKS_PORT
      value: "9050"
    - name: CONTROL_PORT
      value: "9051"
    - name: API_PORT
      value: "5000"
    ports:
    - containerPort: 9050
    - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: tor-9050
  namespace: tor-net
spec:
  selector:
    instance: tor-9050
  ports:
  - name: socks
    port: 9050
  - name: api
    port: 5000

---
apiVersion: v1
